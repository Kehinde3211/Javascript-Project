<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Input-output game</title>
</head>

<body class="bg-black min-h-screen flex justify-center items-center">
    <div class="flex flex-col gap-4 w-full max-w-sm px-4 ml-14 md:mt-70">
        <label id="text" class="text-white text-xl mt-4 mt-[-300px] ml-7 ml[-100px] md:ml-[-150px]">INPUT:</label>
        <input class="text bg-white md:h-[100px] h-10 mt-2  w-full max-w-[200px] mt-2 md:text-xl ml-7 md:w-[600px] md:max-w-none md:ml-[-150px]" placeholder="Input your text here" id="text-input">
        <label id="text" class="text-white text-xl mt-4 ml-7 md:ml-[-150px]">OUTPUT:</label>
        <div class="text bg-white md:h-[100px] h-10 mt-2  w-full max-w-[200px] mt-2 md:text-xl ml-7 md:w-[600px] md:max-w-none md:ml-[-150px]" placeholder="Output your text here" id="text-output">
        </div>
        <script src="input-output.js" defer></script>
</body>

</html>
